<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#071014">
  <meta name="robots" content="index,follow">
  <title>Prévia do livro | Willian Quirino</title>
  <link rel="icon" href="assets/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/reader.css">
</head>
<body class="reader-body">
  <div class="reader-backdrop" data-reader-backdrop aria-hidden="true"></div>

  <header class="reader-header">
    <a class="reader-back-link" href="index.html#livros">
      <span aria-hidden="true">←</span>
      Voltar ao site
    </a>
    <div class="reader-book-name">
      <span>Prévia gratuita</span>
      <strong data-reader-title>Carregando livro...</strong>
    </div>
    <a class="reader-buy-link" data-reader-buy href="#" target="_blank" rel="noopener noreferrer">
      Comprar livro <span aria-hidden="true">↗</span>
    </a>
  </header>

  <main class="reader-main">
    <section class="reader-intro" aria-labelledby="reader-heading">
      <p data-reader-label>Primeiro capítulo</p>
      <h1 id="reader-heading" data-reader-heading>Carregando...</h1>
      <span data-reader-word-count></span>
    </section>

    <section class="reader-audio" data-reader-audio hidden aria-label="Audiobook do primeiro capítulo">
      <div class="reader-audio-heading">
        <span class="reader-audio-eyebrow">Audiobook exclusivo</span>
        <strong data-audio-title>Ouça o primeiro capítulo</strong>
        <small>Narração completa para acompanhar a leitura</small>
      </div>

      <button class="reader-audio-play" type="button" data-audio-play aria-label="Reproduzir audiobook">
        <span data-audio-play-icon aria-hidden="true">▶</span>
      </button>

      <div class="reader-audio-timeline">
        <input
          type="range"
          min="0"
          max="100"
          value="0"
          step="0.1"
          data-audio-progress
          aria-label="Posição do audiobook"
        >
        <div class="reader-audio-time" aria-live="off">
          <span data-audio-current>0:00</span>
          <span data-audio-duration>25:55</span>
        </div>
      </div>

      <button class="reader-audio-speed" type="button" data-audio-speed aria-label="Velocidade de reprodução">
        1×
      </button>

      <audio data-audio-element preload="none"></audio>
    </section>

    <div class="reader-stage" data-reader-stage aria-live="polite">
      <div class="reader-book" data-reader-book>
        <article class="reader-page reader-page-left" data-reader-page-left></article>
        <div class="reader-spine" aria-hidden="true"></div>
        <article class="reader-page reader-page-right" data-reader-page-right></article>
        <div class="reader-turn" data-reader-turn aria-hidden="true">
          <article class="reader-page reader-turn-face reader-turn-front" data-reader-turn-front></article>
          <article class="reader-page reader-turn-face reader-turn-back" data-reader-turn-back></article>
        </div>
      </div>

      <div class="reader-measure" data-reader-measure aria-hidden="true"></div>
    </div>

    <div class="reader-controls">
      <button class="reader-control" type="button" data-reader-prev aria-label="Página anterior">
        <span aria-hidden="true">←</span>
        <span>Anterior</span>
      </button>

      <div class="reader-progress">
        <span data-reader-page-label>Página 1</span>
        <div class="reader-progress-track" aria-hidden="true">
          <span data-reader-progress></span>
        </div>
        <small>Use as setas do teclado ou deslize a página</small>
      </div>

      <button class="reader-control" type="button" data-reader-next aria-label="Próxima página">
        <span>Próxima</span>
        <span aria-hidden="true">→</span>
      </button>
    </div>
  </main>

  <noscript>
    <p class="reader-error">Ative o JavaScript para abrir a prévia do livro.</p>
  </noscript>

  <script src="assets/preview-data.js"></script>
  <script src="assets/reader.js"></script>
</body>
</html>
